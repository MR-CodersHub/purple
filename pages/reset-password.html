<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | PurpleNest Luxury</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/js/main.js"></script>
</head>

<body class="auth-page">

    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="../index.html" class="logo">
                    <div class="logo-icon"><i class="fas fa-crown"></i></div>
                    <div class="logo-text">Purple<span>Nest</span></div>
                </a>
            </nav>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div id="reset-request-step">
                <div class="auth-header">
                    <h1>Reset Access</h1>
                    <p>Enter your registered email to receive a recovery link</p>
                </div>
                <form id="reset-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="concierge@purplenest.com" required>
                        <small class="error-msg" id="email-error"
                            style="color: #e74c3c; display: none; font-size: 0.8rem; margin-top: 5px;">Please enter a
                            valid email address.</small>
                    </div>
                    <button type="submit" class="btn btn-block">Send Reset Link</button>
                    <div class="auth-footer">
                        <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
                    </div>
                </form>
            </div>

            <div id="reset-success-step" style="display: none; text-align: center;">
                <div style="font-size: 4rem; color: var(--accent); margin-bottom: 25px;">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1 style="color: var(--primary-dark); margin-bottom: 15px;">Reset Link Sent</h1>
                <p style="color: var(--text-color); margin-bottom: 30px;">An email has been dispatched with instructions
                    to reset your password. Please check your inbox.</p>
                <a href="login.html" class="btn btn-block">Return to Login</a>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.querySelector('#reset-form');
            const emailInput = document.querySelector('#email');
            const emailError = document.querySelector('#email-error');
            const requestStep = document.querySelector('#reset-request-step');
            const successStep = document.querySelector('#reset-success-step');

            if (resetForm) {
                resetForm.addEventListener('submit', (e) => {
                    e.preventDefault();

                    // Reset error
                    emailError.style.display = 'none';
                    emailInput.style.borderColor = '';

                    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailPattern.test(emailInput.value)) {
                        emailError.style.display = 'block';
                        emailInput.style.borderColor = '#e74c3c';
                        return;
                    }

                    const btn = resetForm.querySelector('button');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Dispatched...';

                    setTimeout(() => {
                        requestStep.style.display = 'none';
                        successStep.style.display = 'block';
                        Cart.showToast('Reset link sent!');
                    }, 1500);
                });
            }
        });
    </script>
</body>

</html>
