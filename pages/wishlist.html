<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Wishlist | PurpleNest Luxury Curations</title>
    <meta name="description" content="View and manage your saved luxury items in your PurpleNest wishlist.">
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon.png?v=2">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/js/main.js"></script>
</head>

<body>

    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="../index.html" class="logo">
                    <div class="logo-icon"><i class="fas fa-crown"></i></div>
                    <div class="logo-text">Purple<span>Nest</span></div>
                </a>
                <div class="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Home</a></li>
                    <li><a href="../home2.html" class="nav-link">Home2</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="shop.html" class="nav-link">Shop</a></li>
                    <li><a href="platform.html" class="nav-link">Platform</a></li>
                    <li><a href="services.html" class="nav-link">Services</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
                <div class="nav-icons">
                    <div class="nav-icon" id="search-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="nav-icon active">
                        <a href="wishlist.html"><i class="fas fa-heart"></i></a>
                    </div>
                    <div class="nav-icon">
                        <a href="cart.html">
                            <i class="fas fa-shopping-bag"></i>
                            <span class="badge cart-count">0</span>
                        </a>
                    </div>
                    <div class="nav-icon user-icon">
                        <i class="far fa-user"></i>
                        <div class="user-dropdown">
                            <a href="login.html">Log In</a>
                            <a href="signup.html">Sign Up</a>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 100px; padding-bottom: 50px; min-height: 60vh;">
        <h1 class="section-title">My Wishlist</h1>

        <div id="wishlist-grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px;">
            <!-- Injected via JS -->
        </div>
        <div id="empty-wishlist" style="text-align: center; display: none;">
            <p>Your wishlist is empty.</p>
            <a href="shop.html" class="btn" style="margin-top: 20px;">Browse Products</a>
        </div>
    </div>

    <footer class="footer"></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('wishlist-grid');
            const emptyMsg = document.getElementById('empty-wishlist');

            function renderWishlist() {
                const items = Wishlist.getItems();

                if (items.length === 0) {
                    grid.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    return;
                }

                grid.style.display = 'grid';
                emptyMsg.style.display = 'none';
                grid.innerHTML = '';

                items.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                         <div class="product-image-container">
                            <img src="${product.image}" alt="${product.name}">
                             <div class="product-actions">
                                <div class="action-btn" onclick="removeFromWishlist(${product.id})" title="Remove"><i class="fas fa-trash"></i></div>
                            </div>
                        </div>
                         <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                             <div class="price">$${product.price.toFixed(2)}</div>
                            <button class="add-to-cart" onclick="Cart.addItem({id: ${product.id}, name: '${product.name.replace(/'/g, "\\'")}', price: ${product.price}, image: '${product.image}'}); removeFromWishlist(${product.id})" style="margin-top: 10px; width: 100%;">
                                <i class="fas fa-shopping-bag"></i> Move to Cart
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            renderWishlist();

            window.removeFromWishlist = (id) => {
                Wishlist.removeItem(id);
                renderWishlist();
            }
        });
    </script>

</body>

</html>
