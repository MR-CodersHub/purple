<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | PurpleNest</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../assets/js/main.js"></script>
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; background: #f8f9fa;">
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="success-container"
            style="text-align: center; background: white; padding: 60px; border-radius: 20px; box-shadow: var(--shadow-lg); max-width: 500px;">
            <div style="font-size: 4rem; color: #28a745; margin-bottom: 20px;">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 style="color: var(--primary); margin-bottom: 10px;">Thank You!</h1>
            <p style="font-size: 1.2rem; color: #666; margin-bottom: 30px;">Your order has been placed successfully.</p>
            <p style="color: #999; margin-bottom: 40px; font-size: 0.9rem;">You will receive an email confirmation
                shortly.
            </p>

            <a href="../index.html" class="btn">Continue Shopping</a>
        </div>
    </div>

    <footer class="footer"></footer>
</body>

</html>
